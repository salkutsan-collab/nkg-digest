name: Обновление базы участников (еженедельно)

# Каждое воскресенье в 04:00 UTC = 07:00 по Москве - за час до дайджеста,
# чтобы воскресный анонс собирался уже по свежей базе.
on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write   # чтобы агент 1 мог сохранить обновлённую базу обратно в репозиторий

jobs:
  refresh-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Проверить и дополнить базу (агент 1)
        run: python agents/agent1_registry.py --apply

      - name: Сохранить изменения базы в репозиторий
        run: |
          git config user.name "nkg-bot"
          git config user.email "nkg-bot@users.noreply.github.com"
          git add data/participants.yaml
          git diff --staged --quiet || git commit -m "Авто-обновление базы участников (агент 1)"
          git push
