name: Стрит-арт радар (ежедневно)

# Запуск каждый день в 06:00 UTC = 09:00 по Москве (через час после дайджеста).
# Плюс кнопка ручного запуска во вкладке Actions.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Нужно право записи: агент сохраняет "память" (что уже показывал) обратно в репозиторий.
permissions:
  contents: write

jobs:
  streetart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Найти новые уличные работы и отправить
        env:
          LLM_PROVIDER: yandex
          YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
          YANDEX_FOLDER_ID: ${{ secrets.YANDEX_FOLDER_ID }}
          YANDEX_MODEL: yandexgpt
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agents/agent3_streetart.py --days 7 --send

      - name: Сохранить память радара
        run: |
          git config user.name "nkg-bot"
          git config user.email "nkg-bot@users.noreply.github.com"
          git add data/streetart_seen.json
          if git diff --cached --quiet; then
            echo "Память не менялась - коммит не нужен."
          else
            git commit -m "Стрит-арт радар: обновлена память (что уже показано)"
            git push
          fi
