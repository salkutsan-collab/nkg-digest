# Источники для агента 3 - "Стрит-арт радар".
#
# Агент следит за этими Telegram-каналами и ищет новости про новые муралы,
# граффити и уличные арт-объекты Петербурга.
#
# Telegram-каналы читаются через веб-витрину t.me/s/<канал> - это работает
# без токена и без регистрации. Поле handle - это имя канала без "@".
#
# Чтобы добавить канал: впишите новую строку в channels с его handle.
# Чтобы убрать - удалите строку. Russia-wide каналы (вся страна) помечайте
# scope: ru, тогда агент строже отбирает по упоминанию Петербурга.

meta:
  city: Санкт-Петербург
  updated: 2026-06-14

# Слова-признаки новинки. Пост попадает в радар, если встретит любое из них.
keywords:
  - мурал
  - граффит
  - арт-объект
  - арт объект
  - паблик-арт
  - паблик арт
  - инсталляц
  - расписал
  - нанес
  - появил
  - новая работа
  - новый объект
  - фасад
  - стен
  - стрит-арт
  - стрит арт
  - уличн

channels:
  - {handle: lenstreet,       name: ЛЕНСТРИТ,                 scope: spb}
  - {handle: streetartkeeper, name: Стрит-арт хранитель (САХ), scope: ru}
