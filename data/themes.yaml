# Тематический график публикаций - своя тема на каждый день недели.
#
# Этот файл читает публикатор (agents/publisher.py): он смотрит, какой
# сегодня день, берёт его тему и собирает пост только по ней.
#
# Поля темы:
#   title             - заголовок поста
#   mode              - events (по умолчанию) | person | weekly_all
#   categories        - какие категории площадок брать (пусто = все живые)
#   event_types       - какие виды событий оставить (пусто = все)
#   include_streetart - добавить блок стрит-арт радара (true/false)
#   weekend_only      - брать только события ближайших субботы-воскресенья
#   gastronomy        - поднимать наверх гастрономические события
#   intro_hint        - подсказка модели для вступления (необязательно)
#
# Виды событий (event_types), которые понимает агент 2:
#   выставка | лекция | мастер-класс | концерт | спектакль | кино |
#   маркет | экскурсия | гастро | фестиваль | другое

meta:
  updated: 2026-06-14
  timezone: Europe/Moscow
  # Сколько событий максимум в одном посте (отбор по релевантности теме).
  limit_daily: 10
  limit_weekly: 20

days:

  monday:
    title: "Понедельник: стрит-арт, выставки и галереи"
    label: "Стрит-арт, выставки и галереи"
    mode: events
    categories: [галерея, музей, стрит-арт, дизайн-центр]
    event_types: [выставка]
    include_streetart: true
    intro_hint: "новые выставки, галереи и уличное искусство недели"

  tuesday:
    title: "Вторник: театры и кино"
    label: "Театры и кино"
    mode: events
    categories: [театр, кино]
    event_types: [спектакль, кино, лекция, экскурсия]
    # Берём только то, что связано с дизайном, художниками, искусством.
    min_relevance: 3
    intro_hint: "спектакли и кино о дизайне, художниках и искусстве"

  wednesday:
    title: "Среда: лекции и мастер-классы"
    label: "Лекции и мастер-классы"
    mode: events
    categories: []
    event_types: [лекция, мастер-класс, экскурсия]
    intro_hint: "лекции, мастер-классы и образовательные встречи"

  thursday:
    title: "Четверг: маркеты, коллаборации и события"
    label: "Маркеты, коллаборации и события"
    mode: events
    categories: []
    event_types: [маркет, фестиваль, концерт, другое]
    intro_hint: "маркеты, фестивали и совместные проекты площадок"

  friday:
    title: "Пятница: планы на выходные и гастрономия"
    label: "Планы на выходные и гастрономия"
    mode: events
    categories: []
    event_types: []
    weekend_only: true
    gastronomy: true
    intro_hint: "куда сходить в выходные, включая гастрономические события"

  saturday:
    title: "Суббота: персона недели"
    mode: person

  sunday:
    title: "Воскресенье: следующая неделя по всем направлениям"
    label: "Следующая неделя по всем направлениям"
    mode: weekly_all
    intro_hint: "что ждёт город на следующей неделе по всем темам"
